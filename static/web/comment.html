<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>JanDan Comments</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            body {
                color: var(--vscode-foreground);
                background: var(--vscode-editor-background);
                line-height: 1.6;
            }

            img {
                display: block;
                max-width: 100%;
                height: auto;
            }

            main {
                max-width: 860px;
                margin: 0 auto;
                padding: 8px 0 24px;
            }

            .comment-section + .comment-section {
                margin-top: 24px;
            }

            .comment-section__title {
                font-size: 16px;
                margin: 0 0 10px;
            }

            .comment-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .comment-item {
                background: var(--vscode-editorWidget-background);
                border: 1px solid var(--vscode-panel-border);
                border-radius: 6px;
                padding: 10px 12px;
            }

            .comment-item__meta {
                color: var(--vscode-descriptionForeground);
                display: flex;
                flex-wrap: wrap;
                font-size: 12px;
                gap: 8px;
            }

            .comment-item__author {
                color: var(--vscode-foreground);
            }

            .comment-item__content {
                margin-top: 8px;
            }

            .comment-item__stats {
                color: var(--vscode-descriptionForeground);
                font-size: 12px;
                margin-top: 8px;
            }

            .comment-message {
                color: var(--vscode-descriptionForeground);
                margin-top: 20px;
            }
        </style>
    </head>

    <body>
        <main>${content}</main>
    </body>
    <script>
        window.addEventListener('message', (event) => {
            if (event.data.type === 'init') {
                window.scroll(0, 0);
            }
        });
    </script>
</html>
